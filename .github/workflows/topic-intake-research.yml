name: Topic Intake Research

on:
  workflow_dispatch:
    inputs:
      title:
        description: Topic title
        required: true
        type: string
      slug:
        description: URL-safe topic slug
        required: true
        type: string
      category:
        description: Topic category
        required: true
        default: sectors
        type: choice
        options:
          - sectors
          - geopolitics
          - internal-growth
          - research-notes
      context:
        description: User-provided starting context
        required: false
        type: string
      questions:
        description: User-provided questions to answer
        required: false
        type: string
      sources:
        description: User-provided source leads or URLs
        required: false
        type: string
      research_model:
        description: OpenAI model for source-backed research
        required: true
        default: gpt-5
        type: string
      depth:
        description: Research depth
        required: true
        default: deep
        type: choice
        options:
          - deep
          - standard

permissions:
  contents: write
  pull-requests: write

jobs:
  research-topic:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Project India tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[research]"

      - name: Normalize slug
        id: topic
        env:
          TITLE: ${{ inputs.title }}
          SLUG: ${{ inputs.slug }}
        run: |
          python - <<'PY'
          import os
          from project_india.topics import slugify

          slug = slugify(os.environ.get("SLUG") or os.environ["TITLE"])
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"slug={slug}\n")
          print(f"Topic slug: {slug}")
          PY

      - name: Create topic workspace and user context
        env:
          TITLE: ${{ inputs.title }}
          SLUG: ${{ steps.topic.outputs.slug }}
          CATEGORY: ${{ inputs.category }}
          CONTEXT: ${{ inputs.context }}
          QUESTIONS: ${{ inputs.questions }}
          SOURCES: ${{ inputs.sources }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          from project_india.topics import TOPIC_FOLDERS, create_topic
          from project_india import paths

          title = os.environ["TITLE"]
          slug = os.environ["SLUG"]
          category = os.environ["CATEGORY"]
          context = os.environ.get("CONTEXT", "").strip()
          questions = os.environ.get("QUESTIONS", "").strip()
          sources = os.environ.get("SOURCES", "").strip()

          files = create_topic(title, slug=slug, category=category)
          request_dir = paths.PROCESSED_DATA / "topic_requests"
          request_dir.mkdir(parents=True, exist_ok=True)
          request_payload = {
              "title": title,
              "slug": slug,
              "category": category,
              "submitted_at": datetime.now(UTC).replace(microsecond=0).isoformat(),
              "context": context,
              "questions": questions,
              "sources": sources,
          }
          (request_dir / f"{slug}.json").write_text(
              json.dumps(request_payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          intake = [
              "",
              "## User Research Input",
              "",
              f"Submitted: {request_payload['submitted_at']}",
              "",
              "### Starting Context",
              context or "No starting context provided.",
              "",
              "### Questions To Answer",
              questions or "No specific questions provided.",
              "",
              "### Source Leads",
              sources or "No source leads provided.",
              "",
          ]
          files.topic.write_text(files.topic.read_text(encoding="utf-8") + "\n".join(intake), encoding="utf-8")

          sources_note = [
              "",
              "## User-Provided Source Leads",
              sources or "No source leads provided.",
              "",
          ]
          files.sources.write_text(
              files.sources.read_text(encoding="utf-8") + "\n".join(sources_note),
              encoding="utf-8",
          )

          config_path = paths.ROOT / "research_config.json"
          config = json.loads(config_path.read_text(encoding="utf-8"))
          topics = [topic for topic in config.get("topics", []) if topic.get("slug") != slug]
          topics.append(
              {
                  "title": title,
                  "slug": slug,
                  "category": category,
                  "enabled": False,
                  "schedule": {
                      "frequency": "manual",
                      "time_utc": None,
                      "last_run_date": None,
                      "next_scheduled_run": None,
                  },
                  "strategy": {
                      "rotation": ["deep"],
                      "current_index": 0,
                      "description": "Created from Streamlit topic intake; research runs are manual unless scheduled later.",
                  },
                  "metadata": {
                      "api_calls_month": 0,
                      "last_cost_usd": 0,
                      "development_status": "intake",
                  },
              }
          )
          config["topics"] = sorted(topics, key=lambda item: item["slug"])
          config_path.write_text(json.dumps(config, indent=4) + "\n", encoding="utf-8")
          PY

      - name: Plan research from repo memory
        env:
          TITLE: ${{ inputs.title }}
          SLUG: ${{ steps.topic.outputs.slug }}
          CATEGORY: ${{ inputs.category }}
        run: project-india plan-research "$TITLE" --slug "$SLUG" --category "$CATEGORY" --force-api

      - name: Run source-backed deep research
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TITLE: ${{ inputs.title }}
          SLUG: ${{ steps.topic.outputs.slug }}
          CATEGORY: ${{ inputs.category }}
          MODEL: ${{ inputs.research_model }}
          DEPTH: ${{ inputs.depth }}
        run: |
          project-india deep-research "$TITLE" \
            --slug "$SLUG" \
            --category "$CATEGORY" \
            --model "$MODEL" \
            --depth "$DEPTH" \
            --force-api

      - name: Update research index
        run: project-india index-research

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: project-india-${{ steps.topic.outputs.slug }}
          path: |
            docs/**
            sources/**
            analyses/**
            data/processed/**
          retention-days: 30

      - name: Open pull request with researched topic
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Research topic: ${{ inputs.title }}"
          title: "Research topic: ${{ inputs.title }}"
          body: |
            Automated research topic generated from the Project India Streamlit intake form.

            Topic: `${{ inputs.title }}`
            Slug: `${{ steps.topic.outputs.slug }}`
            Category: `${{ inputs.category }}`

            This PR includes topic notes, source logs, brief, structured topic data, run record, and updated research index for the Streamlit dashboard.
          branch: research/${{ steps.topic.outputs.slug }}
          delete-branch: true
          labels: |
            research
            automated
          add-paths: |
            docs
            sources
            analyses
            data/processed
            research_config.json

      - name: Auto-merge pull request when admin token is configured
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          ADMIN_TOKEN: ${{ secrets.PROJECT_INDIA_ADMIN_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "PROJECT_INDIA_ADMIN_TOKEN is not configured. PR remains open for manual merge."
            exit 0
          fi

          GH_TOKEN="$ADMIN_TOKEN" gh pr merge "$PR_NUMBER" --merge --delete-branch --admin
