name: Scheduled Incremental Research

on:
  schedule:
    # West Bengal Assembly Election 2026 - weekly Monday 9 AM UTC
    - cron: "0 9 * * 1"
      
    # US-Iran War 2026 - daily 6 AM UTC  
    - cron: "0 6 * * *"
      
  # Allow manual trigger for testing/emergency runs
  workflow_dispatch:
    inputs:
      topic_slug:
        description: "Topic slug to research (or leave empty for all scheduled)"
        required: false
      strategy:
        description: "Research strategy (developments, gaps, factcheck, rotate)"
        required: false
        default: "rotate"
      model:
        description: "OpenAI model to use"
        required: false
        default: "gpt-5"

permissions:
  contents: write
  pull-requests: write

jobs:
  incremental-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[research]"
      
      - name: Determine which topics to run
        id: topics
        env:
          INPUT_TOPIC_SLUG: ${{ github.event.inputs.topic_slug || '' }}
          INPUT_STRATEGY: ${{ github.event.inputs.strategy || 'rotate' }}
        run: |
          import json
          import os
          from datetime import datetime, UTC
          
          with open('research_config.json') as f:
              config = json.load(f)

          input_slug = os.environ.get('INPUT_TOPIC_SLUG', '').strip()
          input_strategy = os.environ.get('INPUT_STRATEGY', 'rotate').strip() or 'rotate'
          
          now = datetime.now(UTC)
          day_name = now.strftime('%A').lower()
          hour = now.hour
          
          topics_to_run = []

          if input_slug:
              topic = next((item for item in config['topics'] if item['slug'] == input_slug), None)
              if topic is None:
                  raise SystemExit(f'No topic found for slug: {input_slug}')
              topics_to_run.append({
                  'title': topic['title'],
                  'slug': topic['slug'],
                  'category': topic['category'],
                  'strategy': input_strategy,
              })
          else:
              for topic in config['topics']:
                  if not topic.get('enabled', True):
                      continue

                  schedule = topic['schedule']
                  freq = schedule['frequency']
                  should_run = False

                  if freq == 'daily':
                      should_run = str(hour).zfill(2) == schedule['time_utc'].split(':')[0]
                  elif freq == 'weekly':
                      day_matches = day_name == schedule.get('day_of_week', 'monday')
                      time_matches = str(hour).zfill(2) == schedule['time_utc'].split(':')[0]
                      should_run = day_matches and time_matches

                  if should_run:
                      rotation = topic.get('strategy', {}).get('rotation', ['developments'])
                      current_index = topic.get('strategy', {}).get('current_index', 0)
                      strategy = rotation[current_index % len(rotation)]
                      topics_to_run.append({
                          'title': topic['title'],
                          'slug': topic['slug'],
                          'category': topic['category'],
                          'strategy': strategy,
                      })
          
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'topics={json.dumps(topics_to_run)}\n')
              output.write(f'has_topics={str(bool(topics_to_run)).lower()}\n')

          print(f'Topics to run: {json.dumps(topics_to_run, indent=2)}')
        shell: python
      
      - name: Run incremental research for scheduled topics
        if: steps.topics.outputs.has_topics == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: ${{ github.event.inputs.model || 'gpt-5' }}
          TOPICS_JSON: ${{ steps.topics.outputs.topics }}
        run: |
          import json
          import os
          import subprocess
          import sys
          
          topics = json.loads(os.environ['TOPICS_JSON'])
          model = os.environ.get('MODEL', 'gpt-5')
          
          if not topics:
              print("No topics scheduled to run at this time.")
              sys.exit(0)
          
          for topic in topics:
              print(f"\\n{'='*60}")
              print(f"Running incremental research: {topic['title']}")
              print(f"{'='*60}")
              
              cmd = [
                  sys.executable, "-m", "project_india.cli", "research-increment",
                  topic['title'],
                  "--slug", topic['slug'],
                  "--category", topic['category'],
                  "--strategy", topic['strategy'],
                  "--model", model,
              ]
              
              result = subprocess.run(cmd, capture_output=False)
              if result.returncode != 0:
                  print(f"ERROR: Research failed for {topic['slug']}")
                  continue
              
              print(f"SUCCESS: Completed research for {topic['slug']}")
        shell: python

      - name: Create research run summary
        if: always()
        run: |
          import json
          import os
          from pathlib import Path

          runs_dir = Path('data/processed/research_runs')
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')

          if not runs_dir.exists():
              print('No research runs found.')
              raise SystemExit(0)
          
          runs = list(runs_dir.glob('*.json'))
          if not runs:
              print('No research runs found.')
              raise SystemExit(0)
          
          latest_run = max(runs, key=lambda p: p.stat().st_mtime)
          with open(latest_run) as f:
              run = json.load(f)

          lines = [
              '## Research Run Summary',
              '',
              f'**Topic:** {run.get("title", "Unknown")}',
              f'**Strategy:** {run.get("strategy", "Unknown")}',
              f'**Timestamp:** {run.get("timestamp", "Unknown")}',
              f'**Cost:** ${run.get("api_cost_usd", 0)}',
              '',
              '### Changes',
              run.get('summary', 'No summary'),
          ]
          print('\n'.join(lines))
          if summary_path:
              with open(summary_path, 'a', encoding='utf-8') as summary:
                  summary.write('\n'.join(lines))
                  summary.write('\n')
        shell: python

      - name: Open pull request with research updates
        if: steps.topics.outputs.has_topics == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(research): scheduled incremental research update"
          title: "chore(research): scheduled incremental research update"
          body: |
            Automated incremental research update.

            This workflow writes updates to docs, sources, reports, research run records, and budget metadata without pushing directly to protected `main`.
          branch: automation/scheduled-incremental-research
          delete-branch: true
          labels: |
            research
            automated
          add-paths: |
            docs
            sources
            analyses
            data/processed
            research_config.json
      
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: research-runs
          path: data/processed/research_runs/
          retention-days: 30
