name: Generate Topic Presentation

on:
  workflow_dispatch:
    inputs:
      title:
        description: Topic title
        required: true
        type: string
      slug:
        description: File slug, for example west-bengal-assembly-election-2026
        required: false
        type: string
      category:
        description: Docs category for the topic note
        required: true
        default: sectors
        type: choice
        options:
          - sectors
          - geopolitics
          - internal-growth
          - research-notes
      research_mode:
        description: Whether to run source-backed AI research before generating the deck
        required: true
        default: deep
        type: choice
        options:
          - deep
          - use-existing-notes
      research_model:
        description: OpenAI model for deep research
        required: true
        default: gpt-5
        type: string
      commit_changes:
        description: Commit generated files back to the repository
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Project India tools
        run: python -m pip install -e ".[presentation,research]"

      - name: Create topic workspace if missing
        env:
          TITLE: ${{ inputs.title }}
          SLUG: ${{ inputs.slug }}
          CATEGORY: ${{ inputs.category }}
        run: |
          if [ -n "$SLUG" ]; then
            project-india new-topic "$TITLE" --slug "$SLUG" --category "$CATEGORY"
          else
            project-india new-topic "$TITLE" --category "$CATEGORY"
          fi

      - name: Run deep research
        if: ${{ inputs.research_mode == 'deep' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TITLE: ${{ inputs.title }}
          SLUG: ${{ inputs.slug }}
          CATEGORY: ${{ inputs.category }}
          MODEL: ${{ inputs.research_model }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for deep research. Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -n "$SLUG" ]; then
            project-india deep-research "$TITLE" --slug "$SLUG" --category "$CATEGORY" --model "$MODEL" --depth deep
          else
            project-india deep-research "$TITLE" --category "$CATEGORY" --model "$MODEL" --depth deep
          fi

      - name: Generate presentation draft
        env:
          TITLE: ${{ inputs.title }}
          SLUG: ${{ inputs.slug }}
          CATEGORY: ${{ inputs.category }}
        run: |
          if [ -n "$SLUG" ]; then
            project-india build-presentation "$TITLE" --slug "$SLUG" --category "$CATEGORY"
          else
            project-india build-presentation "$TITLE" --category "$CATEGORY"
          fi

      - name: Update research index
        run: project-india index-research

      - name: Upload generated presentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-india-presentation
          path: docs/presentations/*.pptx

      - name: Commit generated outputs
        if: ${{ inputs.commit_changes }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate presentation for ${{ inputs.title }}"
          file_pattern: "docs sources analyses data/processed"
