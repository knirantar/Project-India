name: Documentation
description: Improve or add project documentation
title: "[DOCS] "
labels: ["documentation"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What documentation should be added or improved?
      placeholder: Describe the documentation change.
    validations:
      required: true

  - type: textarea
    id: audience
    attributes:
      label: Audience
      description: Who needs this documentation?
      placeholder: Contributors, maintainers, dashboard users, etc.
    validations:
      required: false

  - type: textarea
    id: location
    attributes:
      label: Suggested Location
      description: Where should this live?
      placeholder: README.md, docs/ARCHITECTURE.md, CONTRIBUTING.md, agent-ref/, etc.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add links, examples, screenshots, or related issues.
    validations:
      required: false
