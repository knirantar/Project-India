name: Feature Request
description: Suggest an idea or enhancement for Project India
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature or enhancement! We're always interested in ways to improve Project India.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or enhancement would you like to see?
      placeholder: Describe your feature request clearly
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Solved
      description: What problem would this feature solve? What's the motivation?
      placeholder: Describe the use case or problem
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?
      placeholder: Describe your proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      description: Are there other ways to solve this?
      placeholder: Describe alternative solutions you've considered
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information?
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What category does this feature fall under?
      options:
        - Research & Analysis
        - Documentation
        - Data Pipeline
        - Dashboard/UI
        - Infrastructure
        - Other
    validations:
      required: false
